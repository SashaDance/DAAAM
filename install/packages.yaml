---
repositories:
  # DAAAM
  daaam:
    type: git
    url: git@github.com:MIT-SPARK/DAAAM.git
    version: main
  daaam_ros:
    type: git
    url: git@github.com:MIT-SPARK/DAAAM-ROS.git
    version: main

  # Hydra / Khronos (project-specific branches)
  hydra:
    type: git
    url: git@github.com:MIT-SPARK/Hydra.git
    version: project/daaam
  hydra_ros:
    type: git
    url: git@github.com:MIT-SPARK/Hydra-ROS.git
    version: project/daaam
  spark_dsg:
    type: git
    url: git@github.com:MIT-SPARK/Spark-DSG.git
    version: project/daaam
  # NOTE: To use a custom Khronos branch, change version below
  khronos:
    type: git
    url: git@github.com:nicogorlo/Khronos.git
    version: main

  # SPARK dependencies
  config_utilities:
    type: git
    url: git@github.com:MIT-SPARK/config_utilities.git
    version: main
  ianvs:
    type: git
    url: git@github.com:MIT-SPARK/Ianvs.git
    version: main
  kimera_pgmo:
    type: git
    url: git@github.com:MIT-SPARK/Kimera-PGMO.git
    version: ros2
  kimera_rpgo:
    type: git
    url: git@github.com:MIT-SPARK/Kimera-RPGO.git
    version: develop
  pose_graph_tools:
    type: git
    url: git@github.com:MIT-SPARK/pose_graph_tools.git
    version: ros2
  semantic_inference:
    type: git
    url: git@github.com:MIT-SPARK/semantic_inference.git
    version: main
  spatial_hash:
    type: git
    url: git@github.com:MIT-SPARK/Spatial-Hash.git
    version: main
  teaser_plusplus:
    type: git
    url: git@github.com:MIT-SPARK/TEASER-plusplus.git
    version: master

  # External (built from source)
  gtsam:
    type: git
    url: git@github.com:borglab/gtsam.git
    version: release/4.2
  small_gicp:
    type: git
    url: git@github.com:koide3/small_gicp.git
    version: master
  vision_opencv:
    type: git
    url: https://github.com/ros-perception/vision_opencv.git
    version: rolling
